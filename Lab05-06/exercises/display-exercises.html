<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task 1: Display Property Showcase</title>
  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/display.css">
  <link rel="stylesheet" href="../styles/media-queries.css">
</head>
<body>
  <header>
    <h1>Task 1: Display Property Showcase</h1>
  </header>

  <section>
    <h2>Block vs Inline vs Inline-Block</h2>
    <div class="block-box">Block 1</div>
    <div class="block-box">Block 2</div>
    <span class="inline-box">Inline 1</span>
    <span class="inline-box">Inline 2</span>
    <div class="inline-block-box">Inline-Block 1</div>
    <div class="inline-block-box">Inline-Block 2</div>
  </section>

  <section>
    <h2>Table Display without Table Markup</h2>
    <div class="table">
      <div class="row">
        <div class="cell">Header 1</div>
        <div class="cell">Header 2</div>
        <div class="cell">Header 3</div>
      </div>
      <div class="row">
        <div class="cell">Data 1</div>
        <div class="cell">Data 2</div>
        <div class="cell">Data 3</div>
      </div>
    </div>
  </section>

  <section>
    <h2>Hidden Elements on Different Screens</h2>
    <div class="hidden-mobile">Hidden on Mobile</div>
    <div class="hidden-desktop">Hidden on Desktop</div>
  </section>
</body>
</html>
