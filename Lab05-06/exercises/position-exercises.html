<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task 3: Positioning Challenge</title>
  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/position.css">
  <link rel="stylesheet" href="../styles/media-queries.css">
</head>
<body>
  <!-- Fixed Header -->
  <header class="fixed-header">
    <h1>Task 3: Positioning Challenge</h1>
    <button id="openModal">Open Modal</button>
  </header>

  <div class="container">
    <!-- Sticky Sidebar -->
    <aside class="sticky-sidebar">
      <h2>Sidebar</h2>
      <p>Sticky sidebar content</p>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <p>Main content goes here. Scroll to see sticky sidebar behavior.</p>
      <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit...</p>
      <p>More content...</p>
      <p>Keep scrolling...</p>
    </main>
  </div>

  <!-- Modal -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <span id="closeModal" class="close">&times;</span>
      <h2>Modal Dialog</h2>
      <p>This is an absolutely positioned modal.</p>
    </div>
  </div>

  <script>
    // Modal JS wrapped in IIFE to avoid redeclaration
    (function(){
      const modal = document.getElementById('modal');
      const openBtn = document.getElementById('openModal');
      const closeBtn = document.getElementById('closeModal');

      openBtn.addEventListener('click', () => {
        modal.style.display = 'block';
      });

      closeBtn.addEventListener('click', () => {
        modal.style.display = 'none';
      });

      window.addEventListener('click', (e) => {
        if (e.target == modal) {
          modal.style.display = 'none';
        }
      });
    })();
  </script>
</body>
</html>
