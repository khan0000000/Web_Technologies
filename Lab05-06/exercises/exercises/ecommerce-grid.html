<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task 8: E-commerce Product Grid</title>
  <link rel="stylesheet" href="/Lab05-06/styles/base.css">
  <link rel="stylesheet" href="/Lab05-06/styles/grid.css">
  <link rel="stylesheet" href="/Lab05-06/styles/media-queries.css">
</head>
<body>
  <header>
    <h1>Task 8: E-commerce Product Grid</h1>
  </header>

  <div class="ecommerce-container">
    <!-- Filter Sidebar -->
    <aside class="filter-sidebar">
      <h2>Filters</h2>
      <p>Category, Price, Rating</p>
    </aside>

    <!-- Product Grid -->
    <main class="product-grid">
      <div class="product-card">
        <img src="https://via.placeholder.com/200" alt="Product 1">
        <h3>Product 1</h3>
      </div>
      <div class="product-card">
        <img src="https://via.placeholder.com/200" alt="Product 2">
        <h3>Product 2</h3>
      </div>
      <div class="product-card">
        <img src="https://via.placeholder.com/200" alt="Product 3">
        <h3>Product 3</h3>
      </div>
      <div class="product-card">
        <img src="https://via.placeholder.com/200" alt="Product 4">
        <h3>Product 4</h3>
      </div>
      <div class="product-card">
        <img src="https://via.placeholder.com/200" alt="Product 5">
        <h3>Product 5</h3>
      </div>
    </main>
  </div>
</body>
</html>
