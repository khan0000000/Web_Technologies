<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task 13: Portfolio Layout</title>
  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/grid.css">
  <link rel="stylesheet" href="../styles/felxbox.css">
  <link rel="stylesheet" href="../styles/media-queries.css">
</head>
<body>
  <header class="portfolio-header">
    <h1>My Portfolio</h1>
  </header>

  <div class="portfolio-container">
    <!-- Sidebar -->
    <aside class="portfolio-sidebar">
      <h2>About Me</h2>
      <p>Software Engineer with a passion for creating innovative solutions.</p>
    </aside>

    <!-- Main content -->
    <main class="portfolio-main">
      <section class="project-gallery">
        <div class="project-card">
          <img src="https://via.placeholder.com/300x200" alt="Project 1">
          <h3>Project 1</h3>
        </div>
        <div class="project-card">
          <img src="https://via.placeholder.com/300x200" alt="Project 2">
          <h3>Project 2</h3>
        </div>
        <div class="project-card">
          <img src="https://via.placeholder.com/300x200" alt="Project 3">
          <h3>Project 3</h3>
        </div>
        <div class="project-card">
          <img src="https://via.placeholder.com/300x200" alt="Project 4">
          <h3>Project 4</h3>
        </div>
      </section>
    </main>
  </div>

  <!-- Decorative element using absolute positioning -->
  <div class="decorative-circle"></div>
</body>
</html>
