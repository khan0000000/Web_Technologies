<form action="https://formspree.io/f/your-form-id" method="POST">
    <label>Name:</label>
    <input type="text" name="name" required>
    
    <label>Email:</label>
    <input type="email" name="_replyto" required>
    
    <label>Message:</label>
    <textarea name="message" required></textarea>
    
    <button type="submit">Send</button>
</form>
