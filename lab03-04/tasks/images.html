<!DOCTYPE html>
<html>
<head>
    <title>Image Styling Portfolio</title>
    <link rel="stylesheet" href="../styles/image_portfolio.css">
</head>
<body>

<h1>Image Styling Portfolio</h1>

<div class="gallery">

    <div class="card">
        <img src="https://picsum.photos/300/200?1" class="rounded" alt="Rounded">
        <p>Rounded Corners</p>
    </div>

    <div class="card">
        <img src="https://picsum.photos/200/200?2" class="circle" alt="Circle">
        <p>Circular Image</p>
    </div>

    <div class="card">
        <img src="https://picsum.photos/300/200?3" class="border-shadow" alt="Border Shadow">
        <p>Border & Shadow</p>
    </div>

    <div class="card hover-container">
        <img src="https://picsum.photos/300/200?4" class="hover-effect" alt="Hover">
        <div class="overlay">
            <div class="text">Overlay Text</div>
        </div>
        <p>Hover Overlay</p>
    </div>

    <div class="card">
        <img src="https://picsum.photos/300/200?5" class="filtered" alt="Filtered">
        <p>CSS Filter</p>
    </div>

</div>

</body>
</html>
