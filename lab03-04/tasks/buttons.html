<!DOCTYPE html>
<html>
<head>
    <title>Button Styling Collection</title>
    <link rel="stylesheet" href="../styles/button.css">
</head>
<body>

<h1>Button Styling Collection</h1>

<div class="button-group">

    <!-- Sizes -->
    <button class="btn small">Small Button</button>
    <button class="btn medium">Medium Button</button>
    <button class="btn large">Large Button</button>

    <!-- Colors -->
    <button class="btn primary">Primary</button>
    <button class="btn success">Success</button>
    <button class="btn danger">Danger</button>

    <!-- Shapes -->
    <button class="btn rounded">Rounded</button>
    <button class="btn pill">Pill Shape</button>

    <!-- Gradient & Shadow -->
    <button class="btn gradient">Gradient Button</button>

    <!-- Disabled -->
    <button class="btn primary" disabled>Disabled Button</button>

</div>

</body>
</html>
