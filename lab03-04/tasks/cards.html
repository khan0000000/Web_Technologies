<!DOCTYPE html>
<html>
<head>
    <title>Product Card Design</title>
    <link rel="stylesheet" href="../styles/cards.css">
</head>
<body>

<h1>Our Products</h1>

<div class="card-container">

    <div class="card">
        <img src="https://picsum.photos/300/200?1" alt="Product 1">
        <div class="card-content">
            <h2>Product One</h2>
            <p>This is a high-quality product designed for everyday use.</p>
            <button class="btn">Buy Now</button>
        </div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/300/200?2" alt="Product 2">
        <div class="card-content">
            <h2>Product Two</h2>
            <p>Modern and stylish solution for your personal needs.</p>
            <button class="btn">Learn More</button>
        </div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/300/200?3" alt="Product 3">
        <div class="card-content">
            <h2>Product Three</h2>
            <p>Reliable performance with elegant design and comfort.</p>
            <button class="btn">Order Now</button>
        </div>
    </div>

</div>

</body>
</html>
