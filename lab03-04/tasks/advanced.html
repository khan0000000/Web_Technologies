<!DOCTYPE html>
<html>
<head>
    <title>Advanced CSS Effects</title>
    <link rel="stylesheet" href="advanced.css">
</head>
<body>

<h1 class="gradient-text">Advanced CSS Effects</h1>

<!-- Custom Checkboxes -->
<h2>Custom Checkboxes</h2>

<label class="check-container">
    <input type="checkbox">
    <span class="checkmark"></span>
    Option One
</label>

<label class="check-container">
    <input type="checkbox">
    <span class="checkmark"></span>
    Option Two
</label>

<!-- Custom Radio Buttons -->
<h2>Custom Radio Buttons</h2>

<label class="radio-container">
    <input type="radio" name="choice">
    <span class="radiomark"></span>
    Choice A
</label>

<label class="radio-container">
    <input type="radio" name="choice">
    <span class="radiomark"></span>
    Choice B
</label>

<!-- Loading Animation -->
<h2>Loading Animation</h2>
<div class="loader"></div>

<!-- Text Clipping -->
<h2 class="image-text">IMAGE TEXT</h2>

<!-- Complex Shadow -->
<div class="shadow-box">Complex Shadow</div>

</body>
</html>
